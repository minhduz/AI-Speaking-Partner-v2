# ============================================================
# Nginx config cho AI Speaking Partner v2
# Đặt file này tại: /etc/nginx/sites-available/ai-speaking-partner
#
# Nếu dùng IP (không có domain) → dùng phần "HTTP only"
# Nếu có domain → chạy certbot để tự động thêm SSL block
# ============================================================

# Rate limiting (chống spam)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

server {
    listen 80;
    # Thay YOUR_DOMAIN_OR_IP bằng domain hoặc IP thực của mày
    server_name YOUR_DOMAIN_OR_IP;

    # ── Frontend (Next.js) ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Orchestrator API ────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket cho Speech Service (STT/TTS) ──────────────
    location /speech/ {
        proxy_pass         http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # WebSocket cần timeout dài
        proxy_send_timeout 300s;
    }

    # ── LLM Gateway (nếu FE gọi trực tiếp) ─────────────────
    location /llm/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Health check endpoint ────────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Giới hạn upload size (audio files)
    client_max_body_size 50M;
}
